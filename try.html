<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Management Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#1e252b] font-sans text-gray-200 min-h-screen">

    <nav class="bg-[#181e24] border-b border-gray-800 shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight text-white cursor-pointer hover:text-gray-300 transition-colors">Home</h1>
            <button onclick="openModal('add')" class="bg-[#0d6efd] text-white px-4 py-2 rounded-lg font-medium shadow hover:bg-[#0b5ed7] transition-colors">
                + Add Product
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold text-white">Product</h2>
            <div id="stats" class="text-sm text-gray-400 font-medium"></div>
        </div>

        <div id="productGrid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            </div>

        <div id="emptyState" class="hidden text-center py-12">
            <p class="text-gray-400 text-lg">No products available. Click "+ Add Product" to get started.</p>
        </div>
    </main>

    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center p-4 z-50">
        <div class="bg-[#2a3038] border border-gray-700 rounded-xl shadow-xl max-w-md w-full overflow-hidden transform transition-all">
            <div class="bg-[#181e24] px-6 py-4 flex justify-between items-center text-white border-b border-gray-700">
                <h3 id="modalTitle" class="text-lg font-bold">Add New Product</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl font-semibold">&times;</button>
            </div>
            
            <form id="productForm" onsubmit="handleFormSubmit(event)" class="p-6 space-y-4">
                <input type="hidden" id="productId">
                
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Product Name</label>
                    <input type="text" id="prodName" required class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd]">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Brand</label>
                    <input type="text" id="prodBrand" required class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd]">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Product Image URL</label>
                    <input type="url" id="prodImage" placeholder="https://example.com/image.jpg" class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd]">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-1">Product Description</label>
                    <textarea id="prodDesc" rows="4" required placeholder="Enter product details..." class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd] resize-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Price ($)</label>
                        <input type="number" id="prodPrice" step="0.01" min="0" required class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd]">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-300 mb-1">Availability</label>
                        <select id="prodStock" class="w-full px-3 py-2 bg-[#1e252b] border border-gray-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-[#0d6efd]">
                            <option value="In Stock">In Stock</option>
                            <option value="Low Stock">Low Stock</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                    </div>
                </div>

                <div class="pt-2 flex justify-end space-x-3">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-gray-600 rounded-lg text-gray-300 hover:bg-gray-700 transition-colors">Cancel</button>
                    <button type="submit" class="px-4 py-2 bg-[#0d6efd] text-white rounded-lg hover:bg-[#0b5ed7] transition-colors">Save Product</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const defaultProducts = [
            { 
                id: 1, 
                name: "M3 MacBook Air Pro", 
                brand: "Apple Inc.", 
                price: 1099.00, 
                availability: "In Stock",
                description: "Some quick example text to build on the card title and make up the bulk of the card's content. Supercharged by the next-generation M3 chip, this system features extreme battery efficiency and an ultra-thin aluminum chassis built for developers working on the move.",
                image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca8?w=500&auto=format&fit=crop&q=60"
            },
            { 
                id: 2, 
                name: "Galaxy S24 Ultra Phone", 
                brand: "Samsung Mobile", 
                price: 1299.99, 
                availability: "Low Stock",
                description: "Experience the pinnacle of mobile hardware integration. This device features an embedded S-Pen, an advanced titanium framing layer, and multi-lens AI processing mechanics designed to capture raw resolution imagery under extreme low-light environments.",
                image: "https://images.unsplash.com/photo-1610945265064-0e34e5519bbf?w=500&auto=format&fit=crop&q=60"
            },
            { 
                id: 3, 
                name: "Wireless ANC Headphones", 
                brand: "Sony Audio", 
                price: 398.00, 
                availability: "Out of Stock",
                description: "Engineered with proprietary active noise cancellation matrices, these headphones completely isolate ambient environment disruptions. Features custom-tuned high-fidelity acoustics alongside an ergonomic structure for true listening comfort over long sessions.",
                image: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500&auto=format&fit=crop&q=60"
            }
        ];

        let products = JSON.parse(localStorage.getItem('storeProducts')) || defaultProducts;

        const productGrid = document.getElementById('productGrid');
        const emptyState = document.getElementById('emptyState');
        const productModal = document.getElementById('productModal');
        const productForm = document.getElementById('productForm');
        const modalTitle = document.getElementById('modalTitle');
        const statsDisplay = document.getElementById('stats');

        function updateUI() {
            localStorage.setItem('storeProducts', JSON.stringify(products));
            statsDisplay.textContent = `Total Items: ${products.length}`;
            
            if (products.length === 0) {
                productGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');
            productGrid.innerHTML = products.map(product => {
                let badgeColor = "bg-green-900 text-green-300 border border-green-700";
                if (product.availability === "Low Stock") badgeColor = "bg-amber-900 text-amber-300 border border-amber-700";
                if (product.availability === "Out of Stock") badgeColor = "bg-red-900 text-red-300 border border-red-700";

                const imgUrl = product.image || `https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=500&auto=format&fit=crop&q=60`;

                return `
                    <div class="bg-[#212529] rounded-lg border border-gray-700 overflow-hidden flex flex-col justify-between shadow-lg">
                        <div>
                            <div class="w-full h-64 bg-[#77818a] flex items-center justify-center overflow-hidden relative">
                                <img src="${imgUrl}" alt="${product.name}" class="w-full h-full object-cover">
                                <span class="absolute top-3 right-3 px-2.5 py-0.5 rounded text-xs font-semibold ${badgeColor}">
                                    ${product.availability}
                                </span>
                            </div>
                            
                            <div class="p-5 space-y-3">
                                <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider">${product.brand}</div>
                                <h3 class="text-xl font-semibold text-white tracking-tight">${product.name}</h3>
                                
                                <p class="text-sm text-gray-400 leading-relaxed break-words">
                                    ${product.description}
                                </p>
                                
                                <div class="text-2xl font-bold text-white pt-2">
                                    $${parseFloat(product.price).toFixed(2)}
                                </div>
                            </div>
                        </div>

                        <div class="p-5 pt-0 flex space-x-2">
                            <button onclick="openModal('edit', ${product.id})" class="flex-1 bg-[#0d6efd] hover:bg-[#0b5ed7] text-white py-2 px-4 rounded font-medium transition-colors text-center text-sm">
                                Edit
                            </button>
                            <button onclick="deleteProduct(${product.id})" class="bg-transparent border border-red-600 text-red-500 hover:bg-red-950 px-3 py-2 rounded text-sm transition-colors">
                                Delete
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Modal Management
        function openModal(mode, id = null) {
            productModal.classList.remove('hidden');
            productModal.classList.add('flex');
            
            if (mode === 'edit' && id) {
                modalTitle.textContent = "Edit Product";
                const prod = products.find(p => p.id === id);
                if (prod) {
                    document.getElementById('productId').value = prod.id;
                    document.getElementById('prodName').value = prod.name;
                    document.getElementById('prodBrand').value = prod.brand;
                    document.getElementById('prodImage').value = prod.image || '';
                    document.getElementById('prodDesc').value = prod.description || '';
                    document.getElementById('prodPrice').value = prod.price;
                    document.getElementById('prodStock').value = prod.availability;
                }
            } else {
                modalTitle.textContent = "Add New Product";
                productForm.reset();
                document.getElementById('productId').value = '';
            }
        }

        function closeModal() {
            productModal.classList.remove('flex');
            productModal.classList.add('hidden');
            productForm.reset();
        }

        function handleFormSubmit(e) {
            e.preventDefault();
            
            const id = document.getElementById('productId').value;
            const name = document.getElementById('prodName').value;
            const brand = document.getElementById('prodBrand').value;
            const image = document.getElementById('prodImage').value.trim();
            const description = document.getElementById('prodDesc').value.trim();
            const price = parseFloat(document.getElementById('prodPrice').value);
            const availability = document.getElementById('prodStock').value;

            if (id) {
                products = products.map(p => p.id === parseInt(id) ? { ...p, name, brand, image, description, price, availability } : p);
            } else {
                const newProduct = {
                    id: Date.now(),
                    name,
                    brand,
                    image,
                    description,
                    price,
                    availability
                };
                products.push(newProduct);
            }

            updateUI();
            closeModal();
        }

        function deleteProduct(id) {
            if (confirm("Are you sure you want to delete this product?")) {
                products = products.filter(p => p.id !== id);
                updateUI();
            }
        }

        updateUI();
    </script>
</body>
</html>
